<!DOCTYPE html>
<html>
<head>
    <title>My Favourites</title>
    <button id="logout-btn" onclick="window.location.href='/login'"><b>Logout</b></button>
    <button id="home-btn" onclick="window.location.href='/home'"><b>Home</b></button>

    <style>
        body {
            background-image: url("/static/Images/fav.jpg");
            background-color: rgba(58, 4, 25, 0.333);
            background-repeat: no-repeat;
            background-size: 1370px 1100px;
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: black;
            margin-top: 32px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 30px;
        }

        li {
            margin: 15px 0;
        }

        a {
            display: inline-block;
            font-size: 22px;
            font-family: Georgia, serif;
            font-weight: bold;
            color: black;
            text-decoration: none;

            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 10px;
        }

        a:hover {
            color: rgb(58, 45, 87);
            transform: scale(1.05);
            transition: 0.2s;
        }

        #logout-btn {
          width: 100px;
          height: 30px;
          font-size: 15px;
          position: absolute;
          right: 20px;
          top: 20px;
        }

        #home-btn {
          width: 100px;
          height: 30px;
          font-size: 15px;
          position: absolute;
          right: 140px;
          top: 20px;
        }
    </style>
    <button id="logout-btn" onclick="window.location.href='/login'"><b>Logout</b></button>
</head>
</head>

<body>

<h1>❤️ Favourites</h1>

<ul>
{% for fav in favourites %}

<li>
    <a href="{{ url_for('restaurant', restaurant_name=fav.restaurant_name) }}">
        {{ fav.restaurant_name }}
    </a>
</li>

{% endfor %}
</ul>

</body>
</html>
